org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
# AGP 8.7 supports JDK 17–21. Let Gradle pick whichever the user has installed
# via the org.gradle.java.installations.* properties or the JAVA_HOME they
# configure in Android Studio. We do not pin a JDK path here so the project
# works on any contributor's machine.

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official
